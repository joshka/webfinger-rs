name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release-plz release
    if: >-
      ${{
        github.repository_owner == 'joshka' &&
        (
          github.event_name == 'workflow_dispatch' ||
          startsWith(github.event.head_commit.message, 'chore: release')
        )
      }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Run release-plz release
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-pr:
    name: Release-plz PR
    if: >-
      ${{
        github.repository_owner == 'joshka' &&
        github.event_name == 'push' &&
        !startsWith(github.event.head_commit.message, 'chore: release')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - name: Run release-plz release-pr
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
